name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.2.0)"
        required: true
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Phase 1: Triggered manually — creates a release PR with version bump + manifest update
  create-release-pr:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Bump version in csproj
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" Jellyfin.Plugin.Courses/Jellyfin.Plugin.Courses.csproj
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}</AssemblyVersion>|" Jellyfin.Plugin.Courses/Jellyfin.Plugin.Courses.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.Courses -c Release --nologo

      - name: Create zip
        run: |
          cd Jellyfin.Plugin.Courses/bin/Release/net9.0
          zip -j "$GITHUB_WORKSPACE/Jellyfin.Plugin.Courses.zip" Jellyfin.Plugin.Courses.dll

      - name: Compute checksum
        id: checksum
        run: echo "md5=$(md5sum Jellyfin.Plugin.Courses.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        run: |
          VERSION="${{ inputs.version }}"
          jq --arg ver "$VERSION" \
             --arg url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Jellyfin.Plugin.Courses.zip" \
             --arg md5 "${{ steps.checksum.outputs.md5 }}" \
             --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             '.[0].versions = [{
                version: $ver,
                changelog: "See release notes on GitHub",
                targetAbi: "10.11.0.0",
                sourceUrl: $url,
                checksum: $md5,
                timestamp: $ts
              }] + .[0].versions' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Create release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "release: v${VERSION}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          - Bumped version in \`.csproj\` to \`${VERSION}\`
          - Updated \`manifest.json\` with checksum \`${{ steps.checksum.outputs.md5 }}\`

          **Merging this PR will automatically create git tag \`v${VERSION}\` and a GitHub Release with the plugin zip.**
          EOF
          )" \
            --base main --head "$BRANCH"

  # Phase 2: Triggered when a release PR is merged — creates tag + GitHub Release
  publish-release:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep '<Version>' Jellyfin.Plugin.Courses/Jellyfin.Plugin.Courses.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build Jellyfin.Plugin.Courses -c Release --nologo

      - name: Create zip
        run: |
          cd Jellyfin.Plugin.Courses/bin/Release/net9.0
          zip -j "$GITHUB_WORKSPACE/Jellyfin.Plugin.Courses.zip" Jellyfin.Plugin.Courses.dll

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: Jellyfin.Plugin.Courses.zip
          generate_release_notes: true
